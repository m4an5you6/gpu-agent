name: langfuse
version: "1.0.0"
description: "Optional Langfuse observability for GPUCLOUD — traces conversations, LLM calls, and tool usage. Opt-in via `gpucloud plugins enable observability/langfuse` or `gpucloud tools → Langfuse Observability`."
author: NousResearch
requires_env:
  - GPUCLOUD_LANGFUSE_PUBLIC_KEY
  - GPUCLOUD_LANGFUSE_SECRET_KEY
hooks:
  - pre_api_request
  - post_api_request
  - pre_llm_call
  - post_llm_call
  - pre_tool_call
  - post_tool_call
